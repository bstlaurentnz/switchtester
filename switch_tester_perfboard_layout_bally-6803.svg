<!-- BCM22 odd-pin indicator (phys pin 15, col 8, above R1) -->
<circle cx="268" cy="44" r="5" fill="#3A2060" stroke="#9060D0" stroke-width="0.5"/>
<text x="268" y="35" text-anchor="middle" fill="#9060D0" font-family="monospace" font-size="8">22*</text>

<!-- Direct connection lines (R1 to R3, same column) -->
<g stroke="#555550" stroke-width="1">
<line x1="148" y1="68" x2="148" y2="156"/>
<line x1="178" y1="68" x2="178" y2="156"/>
<line x1="208" y1="68" x2="208" y2="156"/>
<line x1="268" y1="68" x2="268" y2="156"/>
<line x1="298" y1="68" x2="298" y2="156"/>
<line x1="358" y1="68" x2="358" y2="156"/>
<line x1="388" y1="68" x2="388" y2="156"/>
<line x1="418" y1="68" x2="418" y2="156"/>
<line x1="508" y1="68" x2="508" y2="156"/>
<line x1="568" y1="68" x2="568" y2="156"/>
</g>

<!-- Jumper wires (dashed red) -->
<g stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
<!-- J1: CJ4-12 ST3 col7 R3 --> BCM22 odd col8 above R1 -->
<path d="M238 156 L238 112 L268 112 L268 49"/>
<!-- J2: CJ4-9 RI1 col10 R3 --> BCM1 col14 R1 -->
<path d="M328 156 L328 107 L448 107 L448 68"/>
<!-- J3: CJ4-4 RI5 col15 R3 --> BCM16 col19 R1 -->
<path d="M478 156 L478 117 L598 117 L598 68"/>
<!-- J4: CJ4-2 RI7 col17 R3 --> BCM21 col20 R1 -->
<path d="M538 156 L538 122 L628 122 L628 68"/>
</g>

<!-- R1: Pi even GPIO pins -->
<!-- 5V cols 1,2 -->
<circle cx="58" cy="62" r="6" fill="#7A1F1F" stroke="#F09595" stroke-width="0.5"/>
<circle cx="88" cy="62" r="6" fill="#7A1F1F" stroke="#F09595" stroke-width="0.5"/>
<!-- GND col 3 -->
<circle cx="118" cy="62" r="6" fill="#3C3C3A" stroke="#A0A096" stroke-width="0.5"/>
<!-- Strobe col 4 BCM14 -->
<circle cx="148" cy="62" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- Strobe col 5 BCM15 -->
<circle cx="178" cy="62" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- Strobe col 6 BCM18 -->
<circle cx="208" cy="62" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- GND col 7 (ST3 routes to odd pin 15) -->
<circle cx="238" cy="62" r="6" fill="#3C3C3A" stroke="#A0A096" stroke-width="0.5"/>
<!-- Strobe col 8 BCM23 -->
<circle cx="268" cy="62" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- Return col 9 BCM24 -->
<circle cx="298" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- GND col 10 (RI1 jumper dest col14) -->
<circle cx="328" cy="62" r="6" fill="#3C3C3A" stroke="#A0A096" stroke-width="0.5"/>
