<!-- Return col 13 CJ4-6 R4 -->
<circle cx="418" cy="162" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- KEY col 14 CJ4-5 (no pin) -->
<rect x="442" y="156" width="12" height="12" rx="2" fill="#5A4010" stroke="#C8A050" stroke-width="0.5"/>
<!-- Return col 15 CJ4-4 R5 (jumper J3) -->
<circle cx="478" cy="162" r="6" fill="#1A5F5F" stroke="#E24B4A" stroke-width="1"/>
<!-- Return col 16 CJ4-3 R6 -->
<circle cx="508" cy="162" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- Return col 17 CJ4-2 R7 (jumper J4) -->
<circle cx="538" cy="162" r="6" fill="#1A5F5F" stroke="#E24B4A" stroke-width="1"/>
<!-- Strobe col 18 CJ4-1 S5 -->
<circle cx="568" cy="162" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>

