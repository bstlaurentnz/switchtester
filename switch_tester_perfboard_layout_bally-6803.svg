<circle cx="268" cy="162" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- Return col 9 CJ4-10 R0 -->
<circle cx="298" cy="162" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
