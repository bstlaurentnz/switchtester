<circle cx="448" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- GND col 15 (RI5 jumper dest col19) -->
<circle cx="478" cy="62" r="6" fill="#3C3C3A" stroke="#A0A096" stroke-width="0.5"/>
<!-- Return col 16 BCM12 -->
<circle cx="508" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- GND col 17 (RI7 jumper dest col20) -->
<circle cx="538" cy="62" r="6" fill="#3C3C3A" stroke="#A0A096" stroke-width="0.5"/>
<!-- Strobe col 18 BCM20 -->
<circle cx="568" cy="62" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- Return col 19 BCM16 (RI5 jumper dest) -->
<circle cx="598" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- Return col 20 BCM21 (RI7 jumper dest) -->
<circle cx="628" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>

