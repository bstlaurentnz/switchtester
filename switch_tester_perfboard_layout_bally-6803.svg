<!-- R3: CJ4 connector pins (cols 4-18) -->
<!-- Strobe col 4 CJ4-15 S0 -->
<circle cx="148" cy="162" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
