<!-- Legend -->
<rect x="38" y="295" width="610" height="160" rx="4" fill="#1E1E1C" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>
<text x="48" y="312" fill="#C2C0B6" font-family="monospace" font-size="10">Legend</text>

<!-- Legend items row 1 -->
<circle cx="58" cy="330" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<text x="70" y="334" fill="#C2C0B6" font-family="monospace" font-size="9">Strobe</text>
<circle cx="128" cy="330" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<text x="140" y="334" fill="#C2C0B6" font-family="monospace" font-size="9">Return</text>
<circle cx="198" cy="330" r="6" fill="#7A1F1F" stroke="#F09595" stroke-width="0.5"/>
<text x="210" y="334" fill="#C2C0B6" font-family="monospace" font-size="9">5V</text>
<circle cx="248" cy="330" r="6" fill="#3C3C3A" stroke="#A0A096" stroke-width="0.5"/>
<text x="260" y="334" fill="#C2C0B6" font-family="monospace" font-size="9">GND</text>
<circle cx="308" cy="330" r="6" fill="#3A2060" stroke="#9060D0" stroke-width="0.5"/>
<text x="320" y="334" fill="#C2C0B6" font-family="monospace" font-size="9">BCM22* (odd-side Pi pin)</text>
<!-- Legend items row 2 -->
<rect x="52" y="349" width="12" height="12" rx="2" fill="#5A4010" stroke="#C8A050" stroke-width="0.5"/>
<text x="70" y="360" fill="#C2C0B6" font-family="monospace" font-size="9">KEY (no connector pin)</text>
<circle cx="248" cy="355" r="6" fill="#1F3D7A" stroke="#E24B4A" stroke-width="1"/>
<text x="260" y="360" fill="#C2C0B6" font-family="monospace" font-size="9">Pin needs jumper</text>
<line x1="440" y1="355" x2="490" y2="355" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="496" y="360" fill="#C2C0B6" font-family="monospace" font-size="9">Jumper wire</text>

<!-- Board info -->
<text x="48" y="386" fill="#8A8880" font-family="monospace" font-size="9">Perfboard: 20-col x 5-row, 0.100" pitch</text>
<text x="48" y="400" fill="#8A8880" font-family="monospace" font-size="9">R1: Raspberry Pi 2x20 GPIO socket (even-numbered pins face board)</text>
<text x="48" y="414" fill="#8A8880" font-family="monospace" font-size="9">R3: CJ4 15-pin 0.100" Molex KK, CJ4-15 at col 4, CJ4-1 at col 18</text>
<text x="48" y="428" fill="#8A8880" font-family="monospace" font-size="9">* BCM22 (phys pin 15) is the odd-side pin adjacent to col 8; only odd pin used</text>
<text x="48" y="442" fill="#8A8880" font-family="monospace" font-size="9">J1: ST3 col7->BCM22  J2: RI1 col10->col14  J3: RI5 col15->col19  J4: RI7 col17->col20</text>
</svg>
