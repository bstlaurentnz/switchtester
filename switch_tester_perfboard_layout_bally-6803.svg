<circle cx="58" cy="112" r="2.5"/><circle cx="88" cy="112" r="2.5"/><circle cx="118" cy="112" r="2.5"/><circle cx="148" cy="112" r="2.5"/><circle cx="178" cy="112" r="2.5"/><circle cx="208" cy="112" r="2.5"/><circle cx="238" cy="112" r="2.5"/><circle cx="268" cy="112" r="2.5"/><circle cx="298" cy="112" r="2.5"/><circle cx="328" cy="112" r="2.5"/><circle cx="358" cy="112" r="2.5"/><circle cx="388" cy="112" r="2.5"/><circle cx="418" cy="112" r="2.5"/><circle cx="448" cy="112" r="2.5"/><circle cx="478" cy="112" r="2.5"/><circle cx="508" cy="112" r="2.5"/><circle cx="538" cy="112" r="2.5"/><circle cx="568" cy="112" r="2.5"/><circle cx="598" cy="112" r="2.5"/><circle cx="628" cy="112" r="2.5"/>
<circle cx="58" cy="162" r="2.5"/><circle cx="88" cy="162" r="2.5"/><circle cx="118" cy="162" r="2.5"/><circle cx="148" cy="162" r="2.5"/><circle cx="178" cy="162" r="2.5"/><circle cx="208" cy="162" r="2.5"/><circle cx="238" cy="162" r="2.5"/><circle cx="268" cy="162" r="2.5"/><circle cx="298" cy="162" r="2.5"/><circle cx="328" cy="162" r="2.5"/><circle cx="358" cy="162" r="2.5"/><circle cx="388" cy="162" r="2.5"/><circle cx="418" cy="162" r="2.5"/><circle cx="448" cy="162" r="2.5"/><circle cx="478" cy="162" r="2.5"/><circle cx="508" cy="162" r="2.5"/><circle cx="538" cy="162" r="2.5"/><circle cx="568" cy="162" r="2.5"/><circle cx="598" cy="162" r="2.5"/><circle cx="628" cy="162" r="2.5"/>
