<circle cx="388" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
<!-- Return col 13 BCM7 -->
<circle cx="418" cy="62" r="6" fill="#1A5F5F" stroke="#64C8C8" stroke-width="0.5"/>
