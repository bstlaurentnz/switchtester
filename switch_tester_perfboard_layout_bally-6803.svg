<circle cx="178" cy="162" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
<!-- Strobe col 6 CJ4-13 S2 -->
<circle cx="208" cy="162" r="6" fill="#1F3D7A" stroke="#95AFF0" stroke-width="0.5"/>
